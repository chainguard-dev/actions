name: 'Setup Monitoring'
description: |
  This action sets up the Prometheus Stack using the Helm chart using the basic configuration
  (https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack).

inputs:
  helm-version:
    description: |
      Helm version to install (default v4.2.1)
    required: false
    default: v4.2.1

  prometheus-chart-version:
    description: |
      kube-prometheus-stack helm chart version to be installed (default 86.2.3)
    required: false
    default: 86.2.3

  monitoring-namespace:
    description: |
      In which namespace the stack will be deployed (default monitoring-system)
    required: false
    default: monitoring-system

runs:
  using: "composite"

  steps:
    - name: Install Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: ${{ inputs.helm-version }}

    - name: Install Prometheus
      env:
        INPUTS_MONITORING_NAMESPACE: ${{ inputs.monitoring-namespace }}
        INPUTS_PROMETHEUS_CHART_VERSION: ${{ inputs.prometheus-chart-version }}
      shell: bash
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --create-namespace -n "${INPUTS_MONITORING_NAMESPACE}" \
          -f "$GITHUB_ACTION_PATH/values.yaml" \
          --version "${INPUTS_PROMETHEUS_CHART_VERSION}" \
          `# Helm 4 made --wait a WaitStrategy; bare --wait selects the new` \
          `# "watcher" strategy which ignores --timeout, so request the` \
          `# Helm 3-equivalent "legacy" strategy explicitly.` \
          --wait=legacy \
          --timeout 10m
