name: 'boilerplate'
description: |
  This action runs a tool over the files in the working tree
  to check for boilerplate license headers.

inputs:
  extension:
    description: |
      The file extension (no '.') for files to match.
    required: true
    default: go

  language:
    description: |
      The human-readable language name (matching extension)
    required: true
    default: Go

  boilerplate-directory:
    description: |
      The directory in which to look for `boilerplate.{extension}.txt` files.
    required: true
    default: ./hack/boilerplate

  exclude:
    description: |
      Regular expression of paths to exclude.
    required: false
    default: ((vendor|third_party)/|.pb(.gw)?.go|.generated.go)

runs:
  using: "composite"
  steps:
  # Go is an implementation detail of this action (go get below)
  # TODO(mattmoor): Cut a release of `boilerplate-check` we can use instead.
  - name: Set up Go
    uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
    with:
      go-version: 'stable'
      check-latest: true
      cache: false

  - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
    with:
      reviewdog_version: latest

  - name: Install Tools
    shell: bash
    run: |
      cd "$(mktemp -d)" || exit

      echo '::group:: Installing boilerplate-check ... https://github.com/mattmoor/boilerplate-check'
      go install github.com/mattmoor/boilerplate-check/cmd/boilerplate-check@latest
      echo '::endgroup::'

  - name: check boilerplate
    shell: bash
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
      INPUTS_LANGUAGE: ${{ inputs.language }}
      INPUTS_BOILERPLATE_DIRECTORY: ${{ inputs.boilerplate-directory }}
      INPUTS_EXTENSION: ${{ inputs.extension }}
      INPUTS_EXCLUDE: ${{ inputs.exclude }}
    run: |
      set -e
      cd "${GITHUB_WORKSPACE}" || exit 1

      echo "::group:: Running github.com/mattmoor/boilerplate-check for ${INPUTS_LANGUAGE} with reviewdog 🐶 ..."
      # Don't fail because of boilerplate-check
      set +o pipefail
      boilerplate-check check \
        --boilerplate "${INPUTS_BOILERPLATE_DIRECTORY}/boilerplate.${INPUTS_EXTENSION}.txt" \
        --file-extension "${INPUTS_EXTENSION}" \
        --exclude "${INPUTS_EXCLUDE}" |
      reviewdog -efm="%A%f:%l: %m" \
            -efm="%C%.%#" \
            -name="${INPUTS_LANGUAGE} headers" \
            -reporter="github-pr-check" \
            -filter-mode="diff_context" \
            -fail-level="error" \
            -level="error"
      echo '::endgroup::'
