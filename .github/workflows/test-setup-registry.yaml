name: test-setup-registry

on:
  pull_request:
    paths:
      - 'setup-registry/**'
      - '.github/workflows/test-setup-registry.yaml'

permissions: {}

jobs:
  test-mem:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
          api.github.com:443
          cgr.dev:443
          dl.google.com:443
          github.com:443
          go.dev:443
          objects.githubusercontent.com:443
          proxy.golang.org:443
          release-assets.githubusercontent.com:443
          storage.googleapis.com:443
          sum.golang.org:443

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: ./setup-registry
      with:
        port: 8081

    - run: |
        curl -v http://localhost:8081/v2/
        crane copy cgr.dev/chainguard/static:latest-glibc localhost:8081/static:test

  test-disk:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
          api.github.com:443
          cgr.dev:443
          dl.google.com:443
          github.com:443
          go.dev:443
          objects.githubusercontent.com:443
          proxy.golang.org:443
          release-assets.githubusercontent.com:443
          storage.googleapis.com:443
          sum.golang.org:443

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: 'stable'
        check-latest: true
        cache: false

    - uses: ./setup-registry
      with:
        port: 8081
        disk: true

    - run: |
        curl -v http://localhost:8081/v2/
        crane copy cgr.dev/chainguard/static:latest-glibc localhost:8081/static:test
