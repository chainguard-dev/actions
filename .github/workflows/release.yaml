name: release-actions

on:
  schedule:
   - cron: '0 0 * * 1' # weekly on Monday at 00:00

  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run mode: if true, no git tags will be pushed."
        type: boolean
        default: false
      release_type:
        description: "Type of Release"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
      forced_version:
        description: "(Optional) SemVer2-compliant forced-version to tag explicitly, instead of auto-bumping.
                      Must not already exist"
        required: false
        type: string

permissions: {}

jobs:
  release:
    if: ${{ github.repository == 'chainguard-dev/actions' }}

    name: release
    runs-on: ubuntu-latest

    permissions:
      contents: read # to read the repo and tags
      id-token: write # to inject the OIDC token to octo-sts

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            octo-sts.dev:443
            raw.githubusercontent.com:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: release

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetch all history for all tags and branches
          token: ${{ steps.octo-sts.outputs.token }}
          # persist-credentials is required to allow git-tag action to fetch tags and push the new tag back to the repo
          persist-credentials: true

      - name: Check if any changes since last tag
        id: check
        run: |
          git fetch --tags  # no creds needed: repo is public; if this ever goes private, pass token explicitly here
          if [ -z "$(git tag --points-at HEAD)" ]; then
            echo "Nothing points at HEAD, bump a new tag"
            echo "bump=yes" >> "$GITHUB_OUTPUT"
          else
            echo "A tag already points to head, don't bump"
            echo "bump=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump and push Git tag
        id: tag
        uses: chainguard-dev/actions/git-tag@4d37df0d85a91f619edc34a8803323033cdcb124 # v1.6.27
        if: steps.check.outputs.bump == 'yes'
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          git_tag_prefix: "v"
          bump_level: ${{ inputs.release_type || 'patch' }}
          dry_run: ${{ inputs.dry_run || 'false'}}
          forced_version: ${{ inputs.forced_version || '' }}
          author: "octo-sts[bot] <157150467+octo-sts[bot]@users.noreply.github.com>"
          committer: "octo-sts[bot] <157150467+octo-sts[bot]@users.noreply.github.com>"

      # Create the GH release with GitHub-generated notes using the
      # runner-provisioned gh CLI: this step runs with a contents:write
      # token, so it must not execute tooling resolved from a mutable
      # external channel at run time.
      - name: Create GitHub release
        if: steps.check.outputs.bump == 'yes' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GIT_TAG: ${{ steps.tag.outputs.git_tag }}
        run: gh release create "$GIT_TAG" --generate-notes --verify-tag
