name: test-terraform-docs

on:
  pull_request:
    paths:
      - 'setup-terraform-docs/**'
      - '.github/workflows/test-terraform-docs.yaml'

permissions: {}

jobs:
  test_terraform_docs_action:

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - macos-13
          - ubuntu-latest
          - ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    name: Install Terraform Docs and test presence in path
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: block
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          github.com:443
          release-assets.githubusercontent.com:443

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Terraform Docs
      uses: ./setup-terraform-docs

    - name: Check install!
      run: terraform-docs version
