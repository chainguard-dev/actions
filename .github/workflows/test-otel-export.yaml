name: test-otel-export

on:
  pull_request:
    paths:
      - "otel-export/**"
      - ".github/workflows/test-otel-export.yaml"

permissions: {}

jobs:
  test-otel-export:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: otel-export

      - name: Typecheck
        run: npm run check
        working-directory: otel-export

      - name: Test
        run: npm test
        working-directory: otel-export

      - name: Build
        run: npm run build
        working-directory: otel-export

      - name: Check dist is up to date
        run: |
          if [ -n "$(git diff --name-only otel-export/dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' in otel-export/ and commit the result."
            git diff --stat otel-export/dist/
            exit 1
          fi
