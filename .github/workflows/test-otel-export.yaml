name: test-otel-export

on:
  pull_request:
    paths:
      - "otel-export/**"
      - ".github/workflows/test-otel-export.yaml"

permissions: {}

jobs:
  test-otel-export:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: otel-export

      - name: Typecheck
        run: npm run check
        working-directory: otel-export

      - name: Test
        run: npm test
        working-directory: otel-export

      - name: Build
        run: npm run build
        working-directory: otel-export

      - name: Check dist is up to date
        run: |
          if [ -n "$(git diff --name-only otel-export/dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' in otel-export/ and commit the result."
            git diff --stat otel-export/dist/
            exit 1
          fi
