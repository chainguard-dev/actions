name: test-otel-export

on:
  pull_request:
    paths:
      - "otel-export/**"
      - ".github/workflows/test-otel-export.yaml"

permissions: {}

jobs:
  test-otel-export:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: otel-export

      - name: Typecheck
        run: npm run check
        working-directory: otel-export

      - name: Test
        run: npm test
        working-directory: otel-export

      - name: Build
        run: npm run build
        working-directory: otel-export

      - name: Check dist is up to date
        run: |
          if [ -n "$(git diff --name-only otel-export/dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' in otel-export/ and commit the result."
            git diff --stat otel-export/dist/
            exit 1
          fi
