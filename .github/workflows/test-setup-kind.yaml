name: setup-kind

on:
  pull_request:
    branches:
      - main
    paths:
      - 'setup-kind/**'
      - 'setup-knative/**'
      - '.github/workflows/test-setup-kind.yaml'

defaults:
  run:
    shell: bash
    working-directory: ./

concurrency:
  group: test-github-action${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-github-action:
    name: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        k8s-version:
        - 1.31.x
        - 1.32.x
        - 1.33.x
        - 1.34.x
        - 1.35.x
        runner:
        - ubuntu-latest
        - ubuntu-24.04-arm

        # See https://github.com/chainguard-dev/actions/pull/175
        # We're testing whether setting a custom cluster domain works
        cluster-suffix:
        - cluster.local # default value
        - potato.local

        include:
        - k8s-version: 1.31.x
          knative-version: 1.16.0
        - k8s-version: 1.32.x
          knative-version: 1.16.0
        - k8s-version: 1.33.x
          knative-version: 1.17.0
        - k8s-version: 1.34.x
          knative-version: 1.19.0
        - k8s-version: 1.35.x
          knative-version: 1.20.0

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit # TODO(harden-runner): switch to block once IPv6 multicast (ff02::1) is supported
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
          api.github.com:443
          auth.docker.io:443
          cdn01.quay.io:443
          cgr.dev:443
          gcr.io:443
          github.com:443
          net-kourier-controller.knative-serving:443
          packages.wolfi.dev:443
          production.cloudflare.docker.com:443
          quay.io:443
          raw.githubusercontent.com:443
          registry-1.docker.io:443
          release-assets.githubusercontent.com:443

    - name: Checkout the current action
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: ./whereami # Log where I am.
      if: ${{ runner.arch == 'X64' }} # not worth figuring this out for ARM64

    - name: setup-kind
      uses: ./setup-kind
      with:
        k8s-version: ${{ matrix.k8s-version }}
        cluster-suffix: ${{ matrix.cluster-suffix }}

    - name: check registry
      run: |
        docker pull nginx:latest
        docker tag nginx:latest registry.local:5000/nginx:latest
        docker push registry.local:5000/nginx:latest

        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Pod
        metadata:
          name: nginx-local
        spec:
          containers:
          - name: nginx
            image: registry.local:5000/nginx:latest
            ports:
            - containerPort: 80
        EOF

        kubectl wait --for=condition=ready pod/nginx-local --timeout=60s

    - name: check domain
      env:
        CLUSTER_SUFFIX: ${{ matrix.cluster-suffix }}
      run: |
        expected_value="$CLUSTER_SUFFIX"
        dnsDomain=$(docker exec kind-control-plane cat /kind/kubeadm.conf | { grep dnsDomain || true; } | awk '{ print $2 }')

        if [[ "${expected_value}" == "cluster.local" ]]; then
          # the action doesn't explicitly set cluster.local - so we expect an empty value
          if [[ -n "${dnsDomain}" ]]; then
            echo "Cluster domain was set to '${dnsDomain}' instead of 'cluster.local'"
            exit 1
          fi
        else
          if [[ -z "${dnsDomain}" ]]; then
              echo "Cluster domain was not set - expected: '${expected_value}'"
              exit 1
          elif [[ "${expected_value}" != "${dnsDomain}" ]]; then
              echo "Cluster domain expected: '${expected_value}' - actual: '${dnsDomain}'"
              exit 1
          fi
        fi

    - name: Test spinning up Knative
      uses: ./setup-knative
      with:
        version: ${{ matrix.knative-version || 'latest' }}

    - name: Collect diagnostics
      if: ${{ failure() }}
      uses: chainguard-dev/actions/kind-diag@c69a264ec2a5934c3186c618f368fc1c86f16cff # v1.6.19
      with:
        artifact-name: logs.${{ matrix.k8s-version }}

  test-enable-kvm:
    name: test enable-kvm
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit
        allowed-endpoints: >
          *.blob.core.windows.net:443
          api.github.com:443
          cdn01.quay.io:443
          github.com:443
          mirror.gcr.io:443
          packages.wolfi.dev:443
          production.cloudflare.docker.com:443
          quay.io:443
          raw.githubusercontent.com:443
          registry-1.docker.io:443
          release-assets.githubusercontent.com:443

    - name: Checkout the current action
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    # Open /dev/kvm up to docker on the runner so the bind-mount that
    # setup-kind's enable-kvm performs has something to surface.
    # ref: https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-windows-and-linux-larger-hosted-runners/
    - name: Enable KVM access on the runner
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        ls -la /dev/kvm

    - name: setup-kind (enable-kvm)
      uses: ./setup-kind
      with:
        k8s-version: 1.33.x
        enable-kvm: true

    # Confirm the bind-mount happened on the worker but NOT the
    # control plane.
    - name: Verify /dev/kvm presence per node role
      run: |
        if ! docker exec kind-worker test -c /dev/kvm; then
          echo "kind-worker is missing /dev/kvm"
          exit 1
        fi
        echo "kind-worker has /dev/kvm"

        if docker exec kind-control-plane test -c /dev/kvm 2>/dev/null; then
          echo "kind-control-plane unexpectedly has /dev/kvm"
          exit 1
        fi
        echo "kind-control-plane correctly does not have /dev/kvm"

    - name: Collect diagnostics
      if: ${{ failure() }}
      uses: chainguard-dev/actions/kind-diag@c69a264ec2a5934c3186c618f368fc1c86f16cff # v1.6.19
      with:
        artifact-name: logs.enable-kvm
