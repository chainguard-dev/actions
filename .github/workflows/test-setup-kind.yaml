name: setup-kind

on:
  pull_request:
    branches:
      - main
    paths:
      - 'setup-kind/**'
      - 'setup-knative/**'
      - '.github/workflows/test-setup-kind.yaml'

defaults:
  run:
    shell: bash
    working-directory: ./

concurrency:
  group: test-github-action${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-github-action:
    name: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        k8s-version:
        - 1.33.x
        - 1.34.x
        - 1.35.x
        - 1.36.x
        runner:
        - ubuntu-latest
        - ubuntu-24.04-arm

        # See https://github.com/chainguard-dev/actions/pull/175
        # We're testing whether setting a custom cluster domain works
        cluster-suffix:
        - cluster.local # default value
        - potato.local

        include:
        # Knative installs multiple components with one version, so only fully
        # coordinated releases work; Knative >= 1.22 also requires k8s >= 1.34.
        - k8s-version: 1.33.x
          knative-version: 1.17.0
        - k8s-version: 1.34.x
          knative-version: 1.19.0
        - k8s-version: 1.35.x
          knative-version: 1.22.1
        - k8s-version: 1.36.x
          knative-version: 1.22.1

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit # TODO(harden-runner): switch to block once IPv6 multicast (ff02::1) is supported
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
          api.github.com:443
          auth.docker.io:443
          cdn01.quay.io:443
          cgr.dev:443
          gcr.io:443
          github.com:443
          net-kourier-controller.knative-serving:443
          packages.wolfi.dev:443
          production.cloudflare.docker.com:443
          quay.io:443
          raw.githubusercontent.com:443
          registry-1.docker.io:443
          release-assets.githubusercontent.com:443

    - name: Checkout the current action
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - uses: ./whereami # Log where I am.
      if: ${{ runner.arch == 'X64' }} # not worth figuring this out for ARM64

    - name: setup-kind
      uses: ./setup-kind
      with:
        k8s-version: ${{ matrix.k8s-version }}
        cluster-suffix: ${{ matrix.cluster-suffix }}

    - name: check registry
      run: |
        docker pull nginx:latest
        docker tag nginx:latest registry.local:5000/nginx:latest
        docker push registry.local:5000/nginx:latest

        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Pod
        metadata:
          name: nginx-local
        spec:
          containers:
          - name: nginx
            image: registry.local:5000/nginx:latest
            ports:
            - containerPort: 80
        EOF

        kubectl wait --for=condition=ready pod/nginx-local --timeout=60s

    - name: check domain
      env:
        CLUSTER_SUFFIX: ${{ matrix.cluster-suffix }}
      run: |
        expected_value="$CLUSTER_SUFFIX"
        dnsDomain=$(docker exec kind-control-plane cat /kind/kubeadm.conf | { grep dnsDomain || true; } | awk '{ print $2 }')

        if [[ "${expected_value}" == "cluster.local" ]]; then
          # the action doesn't explicitly set cluster.local - so we expect an empty value
          if [[ -n "${dnsDomain}" ]]; then
            echo "Cluster domain was set to '${dnsDomain}' instead of 'cluster.local'"
            exit 1
          fi
        else
          if [[ -z "${dnsDomain}" ]]; then
              echo "Cluster domain was not set - expected: '${expected_value}'"
              exit 1
          elif [[ "${expected_value}" != "${dnsDomain}" ]]; then
              echo "Cluster domain expected: '${expected_value}' - actual: '${dnsDomain}'"
              exit 1
          fi
        fi

    - name: Test spinning up Knative
      uses: ./setup-knative
      with:
        version: ${{ matrix.knative-version || 'latest' }}

    - name: Collect diagnostics
      if: ${{ failure() }}
      uses: chainguard-dev/actions/kind-diag@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
      with:
        artifact-name: logs.${{ matrix.k8s-version }}

  # KinD nodes run as --privileged docker containers, which means
  # /dev/kvm is surfaced from the host into the node container when
  # the host exposes it. The two jobs below pin both halves of that
  # invariant on the runner pools that exercise each path.

  test-kvm-available:
    # ubuntu-latest is x86_64 hosted; /dev/kvm is present on these
    # runners (we just need a udev rule to open the perms).
    name: test kvm available
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit
        allowed-endpoints: >
          *.blob.core.windows.net:443
          api.github.com:443
          cdn01.quay.io:443
          github.com:443
          mirror.gcr.io:443
          packages.wolfi.dev:443
          production.cloudflare.docker.com:443
          quay.io:443
          raw.githubusercontent.com:443
          registry-1.docker.io:443
          release-assets.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    # ref: https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-windows-and-linux-larger-hosted-runners/
    - name: Open /dev/kvm permissions on host
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Assert /dev/kvm present on host
      run: |
        if [ ! -c /dev/kvm ]; then
          echo "expected /dev/kvm on the host, got none"
          exit 1
        fi
        ls -la /dev/kvm

    - name: setup-kind
      uses: ./setup-kind
      with:
        k8s-version: 1.36.x

    - name: Assert /dev/kvm present in every kind node
      run: |
        for node in $(kind get nodes); do
          if ! docker exec "${node}" test -c /dev/kvm; then
            echo "expected /dev/kvm in ${node}, got none"
            exit 1
          fi
          echo "OK: ${node} has /dev/kvm"
        done

    - name: Collect diagnostics
      if: ${{ failure() }}
      uses: chainguard-dev/actions/kind-diag@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
      with:
        artifact-name: logs.kvm-available

  test-kvm-unavailable:
    # ubuntu-24.04-arm is aarch64 hosted; these runners do not ship
    # /dev/kvm. If that changes in the future this test will start
    # failing in the assertion below, which is exactly the regression
    # signal we want.
    name: test kvm unavailable
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read

    steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit
        allowed-endpoints: >
          *.blob.core.windows.net:443
          api.github.com:443
          cdn01.quay.io:443
          github.com:443
          mirror.gcr.io:443
          packages.wolfi.dev:443
          production.cloudflare.docker.com:443
          quay.io:443
          raw.githubusercontent.com:443
          registry-1.docker.io:443
          release-assets.githubusercontent.com:443

    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Assert /dev/kvm absent on host
      run: |
        if [ -e /dev/kvm ]; then
          echo "expected no /dev/kvm on the host, got one:"
          ls -la /dev/kvm
          exit 1
        fi
        echo "OK: /dev/kvm absent on host"

    - name: setup-kind
      uses: ./setup-kind
      with:
        k8s-version: 1.36.x

    - name: Assert /dev/kvm absent from every kind node
      run: |
        for node in $(kind get nodes); do
          if docker exec "${node}" test -e /dev/kvm 2>/dev/null; then
            echo "expected no /dev/kvm in ${node}, got one"
            exit 1
          fi
          echo "OK: ${node} has no /dev/kvm"
        done

    - name: Collect diagnostics
      if: ${{ failure() }}
      uses: chainguard-dev/actions/kind-diag@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
      with:
        artifact-name: logs.kvm-unavailable
