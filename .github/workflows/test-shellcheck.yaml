name: test-shellcheck

on:
  pull_request:
    branches:
      - main
    paths:
      - 'shellcheck/**'
      - '.github/workflows/test-shellcheck.yaml'

permissions: {}

jobs:
  test-github-action:
    name: test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: "write some shell scripts"
        shell: bash
        run: |
          cat > good-script.sh <<"EOF"
          #!/bin/sh
          echo "hello world"
          EOF

          cat > bad-script.sh <<"EOF"
          #!/bin/sh
          # this would fail a call to shellcheck
          echo $VAR1
          EOF

          cat > good-script <<"EOF"
          #!/usr/bin/env bash
          echo "hello env world"
          EOF

          cat > non-script <<"EOF"
          go cubs go
          EOF

          cat > expected <<"EOF"
          bad-script.sh
          good-script
          good-script.sh
          EOF

      - uses: "./shellcheck"
        with:
          subcommand: "find"
          config_json: |
            {
              "excludes": ["[.]git/.*"],
              "paths": ["."],
              "match_filename": true,
              "match_shbang": true,
              "call_combined": true,
              "command": [
                "sh", "-c",
                "for x in \"$@\"; do echo $x; done | tee /tmp/found.out",
                "arg0"]
            }

      - name: "check output"
        shell: bash
        run: |
          sort /tmp/found.out > /tmp/found
          diff -u expected /tmp/found
