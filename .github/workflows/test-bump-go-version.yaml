name: Test Bump Go Version Action

on:
  pull_request:
    paths:
      - 'bump-go-version-file/**'
      - '.github/workflows/test-bump-go-version.yaml'

permissions: {}

jobs:
  test-dry-run:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            go.dev:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create test .go-version file
        run: |
          echo "1.20.0" > .go-version
          cat .go-version

      - name: Test action in dry-run mode
        id: test-dry-run
        uses: ./bump-go-version-file
        with:
          go-version-file: '.go-version'
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: 'true'

      - name: Verify outputs
        env:
          OLD_VERSION: ${{ steps.test-dry-run.outputs.old-version }}
          NEW_VERSION: ${{ steps.test-dry-run.outputs.new-version }}
        run: |
          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"
          if [ -z "$OLD_VERSION" ]; then
            echo "Error: old-version output is empty"
            exit 1
          fi
          if [ -z "$NEW_VERSION" ]; then
            echo "Error: new-version output is empty"
            exit 1
          fi
          echo "✅ Outputs are valid"

      - name: Check file was updated
        env:
          EXPECTED_NEW_VERSION: ${{ steps.test-dry-run.outputs.new-version }}
        run: |
          CURRENT=$(tr -d '[:space:]' < .go-version)
          echo "Current version in file: $CURRENT"
          echo "Expected new version: $EXPECTED_NEW_VERSION"
          if [ "$CURRENT" != "$EXPECTED_NEW_VERSION" ]; then
            echo "Error: File was not updated correctly"
            exit 1
          fi
          echo "✅ File was updated correctly"

  test-already-up-to-date:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            go.dev:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get latest Go version
        id: get-latest
        run: |
          LATEST=$(curl -s https://go.dev/VERSION?m=text | head -n1 | sed 's/go//')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Go version: $LATEST"

      - name: Create up-to-date .go-version file
        env:
          LATEST_VERSION: ${{ steps.get-latest.outputs.latest }}
        run: |
          echo "$LATEST_VERSION" > .go-version
          cat .go-version

      - name: Test action with up-to-date version
        id: test-uptodate
        uses: ./bump-go-version-file
        with:
          go-version-file: '.go-version'
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: 'true'

      - name: Verify no PR would be created
        env:
          OLD_VERSION: ${{ steps.test-uptodate.outputs.old-version }}
          NEW_VERSION: ${{ steps.test-uptodate.outputs.new-version }}
        run: |
          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Error: Versions should be the same"
            exit 1
          fi
          echo "✅ Version is already up to date"

  test-custom-file-path:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            go.dev:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create custom path .go-version file
        run: |
          mkdir -p .github
          echo "1.19.0" > .github/go-version
          cat .github/go-version

      - name: Test action with custom file path
        id: test-custom
        uses: ./bump-go-version-file
        with:
          go-version-file: '.github/go-version'
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: 'true'

      - name: Verify custom file was updated
        env:
          EXPECTED_NEW_VERSION: ${{ steps.test-custom.outputs.new-version }}
        run: |
          CURRENT=$(tr -d '[:space:]' < .github/go-version)
          echo "Current version in custom file: $CURRENT"
          echo "Expected new version: $EXPECTED_NEW_VERSION"
          if [ "$CURRENT" != "$EXPECTED_NEW_VERSION" ]; then
            echo "Error: Custom file was not updated correctly"
            exit 1
          fi
          echo "✅ Custom file path works correctly"

  test-missing-file:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            go.dev:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Test action with missing file (should fail)
        id: test-missing
        continue-on-error: true
        uses: ./bump-go-version-file
        with:
          go-version-file: '.go-version-missing'
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: 'true'

      - name: Verify failure
        env:
          OUTCOME: ${{ steps.test-missing.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "Error: Action should have failed with missing file"
            exit 1
          fi
          echo "✅ Action correctly fails with missing file"
